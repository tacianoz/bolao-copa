# ============================================================================
#  Publica o site no GitHub Pages — "Treta das Nações"
#  Liga o Pages automaticamente (enablement) e faz o deploy do site estático.
# ============================================================================
name: Publicar no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Garante um deploy por vez.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar (e ligar) o Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empacotar o site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
